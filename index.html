<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>哥大社会学知识地图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ee; --bg2:#fbfaf7; --ink:#1f2d31; --ink2:#0f1a1d; --muted:#6d7778;
  --line:#e5ded0; --paper:rgba(255,255,255,.92);
  --shadow:0 16px 42px rgba(30,40,42,.08);
  --blue:#6da8db; --green:#7eb690; --gold:#d5aa53; --red:#dc8b76;
  --purple:#a894d3; --teal:#7ab5bc; --slate:#97a1a7;
  --sea:#dbeaf2; --sea2:#cee0ea; --land:#efe9d8; --landEdge:#cdc3a8;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;color:var(--ink);overflow:hidden;
  font-family:Inter,"Noto Serif SC",-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  background:radial-gradient(1200px 800px at 12% 10%,#fffdf4,#f5f1e7 60%,#ece6d5)}
body:before{content:"";position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(circle at 86% 14%,rgba(126,182,144,.08),transparent 30%),
             radial-gradient(circle at 32% 92%,rgba(213,170,83,.06),transparent 30%)}
button,input{font-family:inherit;color:inherit}
.app{height:100vh;padding:14px;display:flex;flex-direction:column;gap:12px}
.top{min-height:84px;background:var(--paper);backdrop-filter:blur(12px);border-radius:24px;
  box-shadow:var(--shadow);padding:14px 20px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;z-index:5}
.kicker{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#8a9395;font-weight:700}
.title{font-family:"Noto Serif SC",serif;font-size:30px;font-weight:900;letter-spacing:-.02em;line-height:1.05;margin-top:2px}
.subtitle{font-size:12.5px;color:var(--muted);margin-top:5px;max-width:880px;line-height:1.55}
.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:center}
.btn,.chip,.zoomBtn,.miniBtn,.eraBtn,.layerBtn{border:0;cursor:pointer;font-family:inherit}
.btn{padding:9px 14px;border-radius:999px;background:#fff;box-shadow:0 6px 16px rgba(31,41,43,.06);font-size:12.5px;font-weight:800;color:var(--ink);transition:transform .15s,background .15s}
.btn:hover{transform:translateY(-1px)}
.btn.active{background:var(--ink2);color:#fff}
.searchWrap{display:flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:7px 12px;box-shadow:0 6px 16px rgba(31,41,43,.06)}
.searchWrap input{border:0;outline:0;background:transparent;width:170px;font-size:12.5px}
.main{position:relative;flex:1;min-height:0;background:rgba(255,255,255,.5);border-radius:30px;box-shadow:var(--shadow);overflow:hidden}
.sidebar{position:absolute;left:18px;top:18px;bottom:18px;width:228px;background:var(--paper);
  border-radius:22px;box-shadow:0 10px 24px rgba(30,40,42,.06);padding:14px;overflow:auto;z-index:4}
.sideTitle{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:#7b8487;margin:0 0 10px;font-weight:800}
.eraList,.layerList,.quickList{display:grid;gap:6px}
.eraBtn{background:transparent;border-radius:12px;padding:8px 10px;display:grid;
  grid-template-columns:auto 1fr;gap:9px;align-items:center;text-align:left;transition:background .15s}
.eraBtn:hover{background:#fbf7ed}
.eraBtn.active{background:var(--ink2);color:#fff}
.eraBtn .dot{width:9px;height:9px;border-radius:50%}
.eraName{font-size:12px;font-weight:800}
.eraYears{display:block;font-size:10px;opacity:.7;margin-top:1px}
.layerBtn,.miniBtn{background:#fff;border-radius:12px;padding:8px 10px;font-size:12px;
  font-weight:700;color:#4c5b5e;box-shadow:0 4px 10px rgba(31,41,43,.04);text-align:left;transition:transform .12s}
.layerBtn:hover,.miniBtn:hover{transform:translateX(2px)}
.layerBtn.active,.miniBtn.active{background:var(--ink2);color:#fff}
.layerLine{display:inline-block;width:18px;height:3px;border-radius:99px;margin-right:8px;vertical-align:middle}
.canvas{position:absolute;left:262px;right:18px;top:18px;bottom:18px;border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.32));
  overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.5)}
.canvas.withPanel{right:430px}
.view{position:absolute;inset:0;display:none}
.view.active{display:block}
.stage{position:absolute;inset:0;overflow:hidden;cursor:grab;user-select:none}
.stage.dragging{cursor:grabbing}
.board{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
.geneBoard{width:2400px;height:1300px}
.geneSvg{position:absolute;left:0;top:0;width:2400px;height:1300px;pointer-events:none}
.nodeLayer{position:absolute;left:0;top:0;width:2400px;height:1300px}
.eraBand{position:absolute;top:0;height:100%;border-left:1px dashed rgba(0,0,0,.06)}
.eraBandLabel{position:absolute;top:8px;left:10px;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:#9aa2a4;font-weight:800}
.node{position:absolute;transform:translate(-50%,-50%);border:0;background:transparent;
  cursor:grab;text-align:center;max-width:130px;
  transition:opacity .2s ease,filter .2s ease;z-index:1}
.node.dragging{cursor:grabbing;z-index:6}
.node:hover .icon{transform:scale(1.06)}
.node.dim{opacity:.22;filter:saturate(.4)}
.node.selected{z-index:4}
.node .icon{margin:0 auto;display:grid;place-items:center;background:#fff;
  box-shadow:0 10px 22px rgba(31,41,43,.09);position:relative;transition:transform .18s ease,box-shadow .2s}
.node.person .icon{border-radius:50%}
.node.institution .icon{border-radius:14px}
.node.event .icon{border-radius:14px;transform:rotate(45deg)}
.node.event:hover .icon{transform:rotate(45deg) scale(1.06)}
.node.event .emoji{transform:rotate(-45deg)}
.node.concept .icon{border-radius:12px}
.node.hero .icon{width:84px;height:84px;font-size:34px}
.node.big .icon{width:66px;height:66px;font-size:28px}
.node.mid .icon{width:54px;height:54px;font-size:23px}
.node.small .icon{width:44px;height:44px;font-size:19px}
.node.selected .icon{box-shadow:0 0 0 5px rgba(109,168,219,.22),0 14px 28px rgba(31,41,43,.16)}
.label{margin-top:10px;padding:3px 7px;border-radius:8px;background:rgba(255,255,255,.85);
  font-size:11.5px;font-weight:800;line-height:1.18;display:inline-block}
.label small{display:block;margin-top:1px;font-size:9.5px;color:#7c8789;font-weight:600}
.yearBadge{position:absolute;left:50%;bottom:-10px;transform:translateX(-50%);background:#fff;
  border-radius:999px;padding:2px 7px;font-size:9px;font-weight:800;color:#5a6669;
  box-shadow:0 3px 10px rgba(0,0,0,.08);white-space:nowrap}
.legendStrip{position:absolute;left:16px;top:16px;display:flex;gap:7px;flex-wrap:wrap;z-index:3}
.chip{background:#fff;border-radius:999px;padding:7px 12px;font-size:11px;font-weight:800;
  color:#576366;box-shadow:0 6px 14px rgba(31,41,43,.05);transition:transform .12s}
.chip:hover{transform:translateY(-1px)}
.chip.active{background:var(--ink2);color:#fff}
.zoomBox{position:absolute;right:16px;bottom:16px;z-index:6;display:flex;gap:7px}
.zoomBtn{width:36px;height:36px;border-radius:50%;background:#fff;
  box-shadow:0 8px 18px rgba(31,41,43,.09);font-size:17px;font-weight:900;color:#324144;transition:transform .12s}
.zoomBtn:hover{transform:translateY(-2px)}
.panel{position:absolute;right:18px;top:18px;bottom:18px;width:394px;background:var(--paper);
  border-radius:24px;box-shadow:var(--shadow);overflow:hidden;z-index:5;display:flex;
  flex-direction:column;transition:width .22s ease, transform .22s ease}
.panel.closed{width:52px}
.panelHead{padding:14px 16px 12px;border-bottom:1px solid var(--line);
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
.panel.closed .panelHead{display:block;text-align:center;border-bottom:0;padding-top:18px}
.panel.closed .panelBody,.panel.closed .panelMeta,.panel.closed h2,.panel.closed .sub{display:none}
.panelIcon{font-size:32px;line-height:1}
.panel h2{font-family:"Noto Serif SC",serif;font-size:23px;margin:0;line-height:1.06;font-weight:900}
.sub{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
.closeBtn{border:0;background:#eef1f0;border-radius:50%;width:30px;height:30px;cursor:pointer;
  font-weight:900;color:#4d595c;font-size:16px;line-height:1}
.panelBody{padding:14px 16px 18px;overflow:auto}
.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#f7f0da;color:#7b5d10;
  font-size:11px;font-weight:800}
.panelMeta{margin:9px 0 0;display:flex;gap:6px;flex-wrap:wrap}
.metaTag{display:inline-block;background:#f3f6f6;border-radius:999px;padding:4px 9px;font-size:11px;color:#596669}
.box{background:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 4px 12px rgba(31,41,43,.04);margin-top:11px}
.boxTitle{display:inline-block;font-size:12px;font-weight:900;color:#1c2a30;
  border-bottom:3px solid #f2df8f;padding-bottom:2px}
.box p,.box li{margin:7px 0 0;font-size:13px;line-height:1.62;color:#4d585b}
.box ul{padding-left:18px;margin:6px 0 0}
.timeline{margin-top:9px;padding-left:16px;border-left:2px solid #ece2c7}
.tItem{position:relative;margin:0 0 11px}
.tItem:before{content:"";position:absolute;left:-22px;top:5px;width:9px;height:9px;border-radius:50%;
  background:#7ab691;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.08)}
.tDate{font-size:11px;font-weight:900;color:#5b676a}
.tText{font-size:12px;color:#5f6a6c;line-height:1.45;margin-top:1px}
.toast{position:absolute;left:50%;top:84px;transform:translate(-50%,-6px);background:#fff;
  padding:8px 14px;border-radius:999px;box-shadow:var(--shadow);font-size:12px;color:#546165;
  opacity:0;transition:.22s ease;pointer-events:none;z-index:20}
.toast.show{opacity:1;transform:translate(-50%,0)}
.routePath{fill:none;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.06))}
.routePath.dim{stroke-width:1.6;stroke-dasharray:6 6;opacity:.22;filter:none}
.pinCircle{fill:#fff;stroke:rgba(31,41,43,.18);stroke-width:1.4}
.pinDot{fill:#fff;stroke-width:2}
.pinLabelBg{fill:rgba(255,255,255,.96);stroke:rgba(0,0,0,.06);stroke-width:1}
.pinLabel{font-size:11px;font-weight:800;fill:#1d3138}
.pinYear{font-size:9.5px;fill:#65757a;font-weight:600}
.routeName{font-size:12px;font-weight:800;fill:#2c5862}
.leader{stroke:rgba(0,0,0,.25);stroke-width:1;fill:none}
.graticule{stroke:rgba(255,255,255,.55);stroke-width:.6;fill:none}
.coast{fill:var(--land);stroke:var(--landEdge);stroke-width:1;stroke-linejoin:round}
.cityHint{font-size:10.5px;fill:#7a8a8e;font-weight:600;pointer-events:none}
.oceanLabel{font-size:13px;font-weight:700;fill:rgba(255,255,255,.85);letter-spacing:.18em;text-transform:uppercase}
.regionLabel{font-size:11px;font-weight:800;fill:rgba(40,60,68,.45);letter-spacing:.14em;text-transform:uppercase}

/* v4: route selector, draggable map labels, clearer layer feedback */
.routeDock{position:absolute;left:16px;top:58px;z-index:4;width:220px;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-radius:18px;padding:10px;box-shadow:0 10px 24px rgba(31,41,43,.08);display:none}
#mapView.active .routeDock{display:block}
.routeDockTitle{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#7b8487;font-weight:900;margin:0 0 8px}
.routeGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.routePick{border:0;background:#fff;border-radius:12px;padding:7px 8px;font-size:11px;font-weight:800;text-align:left;cursor:pointer;box-shadow:0 4px 10px rgba(31,41,43,.04);transition:background .14s,transform .14s,color .14s}
.routePick:hover{transform:translateY(-1px)}
.routePick.active{background:var(--ink2);color:#fff}
.routeHint{font-size:11px;line-height:1.45;color:#647073;margin-top:8px;background:#f7f4ec;border-radius:12px;padding:7px 8px}
.labelDrag{cursor:grab}.labelDrag.dragging{cursor:grabbing}
.layerBtn.inactive{opacity:.42}.layerBtn.active{box-shadow:0 0 0 2px rgba(31,41,43,.05),0 6px 14px rgba(31,41,43,.06)}
.layerStatus{font-size:10px;opacity:.66;margin-left:4px}

@media (max-width:1360px){
  .sidebar{width:210px}.canvas{left:240px}.canvas.withPanel{right:404px}.panel{width:368px}.searchWrap input{width:140px}
}
</style>

/* 投影范围：经度 [-130, 30]，纬度 [25, 65]   线性映射 */
const MAP_W = 1600, MAP_H = 920;
const LON_MIN=-130, LON_MAX=30, LAT_MIN=25, LAT_MAX=65;
function proj(lon,lat){
  const x = (lon - LON_MIN) / (LON_MAX - LON_MIN) * MAP_W;
  const y = MAP_H - (lat - LAT_MIN) / (LAT_MAX - LAT_MIN) * MAP_H;
  return [x,y];
}

/* 关键改进：让线穿过节点时，绕开节点。
   做法：用强垂直 Bezier；同时根据是否被选中调整粗细 / 透明度。 */
function edgePath(a,b){
  const dx=b.x-a.x, dy=b.y-a.y;
  const adx=Math.abs(dx), ady=Math.abs(dy);
  // 主要按 x 方向延伸：曲率与水平距离成正比
  const k = Math.min(.45, Math.max(.18, adx>0?180/adx:.3));
  const c1x = a.x + dx*k, c1y = a.y;
  const c2x = b.x - dx*k, c2y = b.y;
  return `M ${a.x} ${a.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${b.x} ${b.y}`;
}

/* ---- 节点拖拽（在缩放/平移坐标系中） ---- */
function attachNodeDrag(el, node){
  let startX=0, startY=0, baseX=0, baseY=0, moved=false, dragging=false;
  el.addEventListener('mousedown',e=>{
    e.stopPropagation(); e.preventDefault();
    dragging=true; moved=false;
    // v4: show the content panel immediately on pointer down; users no longer need to drag to trigger a refresh.
    state.selected=node.id; if(!state.panelOpen) state.panelOpen=true; renderPanel(); redrawEdgesOnly();
    document.querySelectorAll('#nodeLayer .node').forEach(x=>x.classList.toggle('selected', x.dataset.id===node.id));
    const z=state.gene.zoom;
    startX=e.clientX; startY=e.clientY;
    const p=nodePos(node); baseX=p.x; baseY=p.y;
    el.classList.add('dragging');
    function onMove(ev){
      const dx=(ev.clientX-startX)/z, dy=(ev.clientY-startY)/z;
      if(Math.hypot(dx,dy)>2) moved=true;
      state.customPos[node.id] = {x:baseX+dx, y:baseY+dy};
      el.style.left=(baseX+dx)+'px'; el.style.top=(baseY+dy)+'px';
      // 重画连线（轻量：只更新 svg 边）
      redrawEdgesOnly();
    }
    function onUp(){
      dragging=false; el.classList.remove('dragging');
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      if(!moved){ state.selected=node.id; if(!state.panelOpen) state.panelOpen=true; renderAll(); }
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  });
}

function ensureArrowMarker(svg, id, color, dim){
  let defs = svg.querySelector('defs');
  if(!defs){ defs=document.createElementNS('http://www.w3.org/2000/svg','defs'); svg.prepend(defs); }
  const markerId = `arrow-${id}-${dim?'dim':'active'}`;
  if(!svg.querySelector('#'+markerId)){
    const m=document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id',markerId); m.setAttribute('viewBox','0 0 10 10');
    m.setAttribute('refX','8.5'); m.setAttribute('refY','5');
    m.setAttribute('markerWidth', dim?'5':'7'); m.setAttribute('markerHeight', dim?'5':'7');
    m.setAttribute('orient','auto-start-reverse');
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M 0 0 L 10 5 L 0 10 z');
    p.setAttribute('fill',color); p.setAttribute('opacity',dim?'.35':'.95');
    m.appendChild(p); defs.appendChild(m);
  }
  return markerId;
}

function routeSegmentPath(a,b,idx,id){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  const dx=b.x-a.x, dy=b.y-a.y;
  const len=Math.max(1,Math.hypot(dx,dy));
  const nx=-dy/len, ny=dx/len;
  const routeShift={
    lazarsfeld:-.55, merton:.35, adorno:.82, maciver:-.90,
    white:1.15, tilly:-1.18, small:.72, khan:-.72, milstein:.45
  };
  const direction = routeShift[id] ?? (idx%2? .7 : -.7);
  const off = Math.min(150, len*0.22) * direction;
  const cx=mx + nx*off, cy=my + ny*off;
  return `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
}

function drawRoute(svg, id, r, isActive){
  const NS='http://www.w3.org/2000/svg';
  const pts=r.points;
  const markerId=ensureArrowMarker(svg,id,r.color,!isActive);
  // v4: draw each segment separately, each with an arrow head, so direction is explicit.
  for(let i=1;i<pts.length;i++){
    const path=document.createElementNS(NS,'path');
    path.setAttribute('d', routeSegmentPath(pts[i-1],pts[i],i,id));
    path.setAttribute('stroke', r.color);
    path.setAttribute('marker-end', `url(#${markerId})`);
    path.setAttribute('class','routePath'+(isActive?'':' dim'));
    svg.appendChild(path);
  }

  // pin + draggable labels
  const NYC_DIRS = {NewYork:[30,-34], Princeton:[38,38], Newark:[-112,-38], Boston:[32,-38], Toronto:[-112,-28], Vienna:[30,-28], Oxford:[30,34], Frankfurt:[30,-30], Stornoway:[30,-28], Chicago:[34,32], AnnArbor:[34,-34], Tucson:[30,30], NewOrleans:[32,36], Phila:[32,40]};
  pts.forEach((p,idx)=>{
    const isStart=idx===0, isEnd=idx===pts.length-1;
    const r1 = isEnd? 9 : (isStart? 8 : 6);
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',p.x); c.setAttribute('cy',p.y);
    c.setAttribute('r',r1);
    c.setAttribute('class','pinDot');
    c.setAttribute('fill', isEnd ? r.color : '#fff');
    c.setAttribute('stroke', r.color);
    svg.appendChild(c);

    if(isActive){
      const key = `${id}_${idx}`;
      const base = NYC_DIRS[p.key] || [18,-22];
      const saved = state.mapLabelOffsets[key] || {dx:base[0]*1.25, dy:base[1]*1.25};
      const lx = p.x + saved.dx, ly = p.y + saved.dy;
      const lab = `${p.name}`;
      const yr = `${p.year}`;
      const w = Math.min(210, Math.max(132, lab.length*7 + 24, yr.length*5.8 + 24));
      const leader=document.createElementNS(NS,'line');
      leader.setAttribute('x1',p.x); leader.setAttribute('y1',p.y);
      leader.setAttribute('x2',lx); leader.setAttribute('y2',ly);
      leader.setAttribute('class','leader');
      svg.appendChild(leader);
      const g=document.createElementNS(NS,'g');
      g.setAttribute('class','labelDrag');
      g.dataset.key=key;
      const bx = saved.dx<0 ? lx-w+4 : lx-4;
      const by = ly-16;
      const anchor = saved.dx<0 ? 'end' : 'start';
      const tx = saved.dx<0 ? lx-8 : lx+8;
      const t1=document.createElementNS(NS,'text');
      t1.setAttribute('x',tx); t1.setAttribute('y',ly-2);
      t1.setAttribute('text-anchor',anchor);
      t1.setAttribute('class','pinLabel'); t1.textContent=lab;
      g.appendChild(t1);
      const t2=document.createElementNS(NS,'text');
      t2.setAttribute('x',tx); t2.setAttribute('y',ly+14);
      t2.setAttribute('text-anchor',anchor);
      t2.setAttribute('class','pinYear'); t2.textContent=yr;
      g.appendChild(t2);
      svg.appendChild(g);
      attachMapLabelDrag(g, leader, p, key, saved);
    }
  });
}

function truncateLabel(str, n){ return str && str.length>n ? str.slice(0,n)+'…' : str; }

function attachMapLabelDrag(group, leader, point, key, saved){
  let startX=0,startY=0,baseDx=0,baseDy=0,dragging=false;
  group.addEventListener('mousedown',e=>{
    e.stopPropagation(); e.preventDefault();
    dragging=true; group.classList.add('dragging');
    startX=e.clientX; startY=e.clientY; baseDx=saved.dx; baseDy=saved.dy;
    function move(ev){
      if(!dragging) return;
      const dx=(ev.clientX-startX)/state.map.zoom;
      const dy=(ev.clientY-startY)/state.map.zoom;
      const ndx=baseDx+dx, ndy=baseDy+dy;
      state.mapLabelOffsets[key]={dx:ndx,dy:ndy};
      const ddx=ndx-saved.dx, ddy=ndy-saved.dy;
      group.setAttribute('transform',`translate(${ddx},${ddy})`);
      leader.setAttribute('x2',point.x+ndx); leader.setAttribute('y2',point.y+ndy);
    }
    function up(){ dragging=false; group.classList.remove('dragging'); window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); renderMap(); }
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  });
}

function renderRouteDock(activeId){
  const grid=$('#routeGrid'); if(!grid) return;
  const buttons = Object.keys(routes).map(id=>`<button class="routePick ${id===activeId?'active':''}" data-routepick="${id}"><span class="routeColor" style="background:${routes[id].color}"></span>${nodeById[id]?.label||id}</button>`).join('');
  const r = routes[activeId] || routes.lazarsfeld;
  const detail = `<div class="routeDetail"><div class="routeDetailTitle">知识行李追踪</div>${r.points.map((p,i)=>`<div class="routeDetailItem"><div class="routeDetailMeta"><span>${p.year}</span><b>${p.name}</b></div><p>${p.note}</p></div>`).join('')}</div>`;
  grid.innerHTML = `<div class="routeButtonList">${buttons}</div>${detail}`;
  grid.querySelectorAll('[data-routepick]').forEach(btn=>btn.onclick=()=>{ state.selected=btn.dataset.routepick; renderAll(); toast('已切换路线：'+(nodeById[state.selected]?.label||state.selected)); });
}

/* =========================================================

function renderContentBlock(content){
  if(Array.isArray(content)){
    return `<ul class="bulletList">${content.map(item=>`<li>${item}</li>`).join('')}</ul>`;
  }
  return `<p>${content||''}</p>`;
}

function sectionTitle(n, kind){

    giddings:{critical:'方法限度', changed:'方法贡献', legacy:'后继影响'},
    dept:{critical:'系所内部路线', changed:'制度功能', legacy:'制度遗产'},
    maciver:{critical:'系所路线冲突', changed:'理论贡献', legacy:'后继影响'},
    lynd:{critical:'公共知识的制度条件', changed:'公共取向', legacy:'后继影响'},
    adorno:{critical:'认识论冲突', changed:'批判问题意识', legacy:'传播学影响'},
    lazarsfeld:{critical:'方法争议', changed:'方法与组织贡献', legacy:'后继影响'},
    merton:{critical:'理论限度与批评', changed:'理论贡献', legacy:'学术传承'},
    basr:{critical:'组织条件与代价', changed:'组织功能', legacy:'制度遗产'},
    mills:{critical:'系内处境与批判对象', changed:'批判贡献', legacy:'公共社会学影响'},
    coleman:{critical:'外溢与失血', changed:'政策研究贡献', legacy:'后继影响'},
    blau:{critical:'外溢与失血', changed:'理论与方法贡献', legacy:'后继影响'},
    lipset:{critical:'理论争议', changed:'政治社会学贡献', legacy:'后继影响'},
    bell:{critical:'理论争议', changed:'公共理论贡献', legacy:'后继影响'},
    decline:{critical:'结构性原因', changed:'历史作用', legacy:'后续影响'},
    chicago_school:{critical:'学派竞争', changed:'方法路线', legacy:'学术地理影响'},
    wisconsin:{critical:'学术地理转移', changed:'方法路线', legacy:'后续影响'},
    white:{critical:'方法边界', changed:'关系社会学贡献', legacy:'后继影响'},
    tilly:{critical:'方法要求', changed:'历史社会学贡献', legacy:'后继影响'},
    iserp:{critical:'平台边界', changed:'平台功能', legacy:'制度遗产'},
    bearman:{critical:'方法边界', changed:'代表研究', legacy:'后继影响'},
    wimmer:{critical:'方法要求', changed:'代表研究', legacy:'后继影响'},
    eyal:{critical:'分析难点', changed:'代表研究', legacy:'后继影响'},
    stark:{critical:'分析难点', changed:'代表研究', legacy:'后继影响'},
    khan:{critical:'人才流动', changed:'代表研究', legacy:'后继影响'},
    small:{critical:'当代学术位置', changed:'代表研究', legacy:'制度象征'},
    milstein:{critical:'组织劳动的可见性', changed:'项目运行贡献', legacy:'制度影响'},
    maProgram:{critical:'训练边界', changed:'研究集群', legacy:'项目定位'}
  };
  if(byId[n.id] && byId[n.id][kind]) return byId[n.id][kind];
  if(kind==='changed'){
    if(n.group==='institution') return '制度功能';
    if(n.group==='event') return '历史作用';
    if(n.group==='concept') return '方法与概念作用';
    return '核心贡献';
  }
  if(kind==='critical'){
    if(n.group==='institution') return '组织条件与代价';
    if(n.group==='event') return '结构性原因';
    if(n.group==='concept') return '方法边界';
    return '争议与限度';
  }
  if(kind==='legacy'){
    if(n.group==='institution') return '制度遗产';
    if(n.group==='event') return '后续影响';
    return '学术史影响';
  }
  return '简介';
}

function renderInfoSection(title, content){
  if(!content || (Array.isArray(content) && content.length===0)) return '';
  return `<section class="infoBlock"><h3>${title}</h3>${renderContentBlock(content)}</section>`;
}

/* =========================================================
   平移 / 缩放 / 惯性
   ========================================================= */
function applyTransform(which){
  const st=state[which];
  const board = which==='gene'?$('#geneBoard'):$('#mapBoard');
  board.style.transform=`translate(${st.panX}px,${st.panY}px) scale(${st.zoom})`;
}
function setupPanZoom(stageEl, which){
  let dragging=false,sx=0,sy=0,bx=0,by=0,vx=0,vy=0,lastT=0,lastX=0,lastY=0,raf=null;
  stageEl.addEventListener('mousedown',e=>{
    if(e.target.closest('.node')) return; // 节点拖拽优先
    dragging=true; sx=e.clientX; sy=e.clientY;
    bx=state[which].panX; by=state[which].panY;
    vx=vy=0; lastT=performance.now(); lastX=e.clientX; lastY=e.clientY;
    stageEl.classList.add('dragging');
    if(raf){cancelAnimationFrame(raf); raf=null;}
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const nx=bx+(e.clientX-sx), ny=by+(e.clientY-sy);
    const t=performance.now(); const dt=Math.max(1,t-lastT);
    vx=(e.clientX-lastX)/dt*16; vy=(e.clientY-lastY)/dt*16;
    lastT=t; lastX=e.clientX; lastY=e.clientY;
    state[which].panX=nx; state[which].panY=ny; applyTransform(which);
  });
  window.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false; stageEl.classList.remove('dragging');
    function step(){
      vx*=0.92; vy*=0.92;
      if(Math.abs(vx)<.3 && Math.abs(vy)<.3){ raf=null; return; }
      state[which].panX+=vx; state[which].panY+=vy; applyTransform(which);
      raf=requestAnimationFrame(step);
    }
    raf=requestAnimationFrame(step);
  });
  stageEl.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=stageEl.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const z0=state[which].zoom;
    const mult=e.deltaY<0?1.1:0.9;
    const z1=Math.max(.3, Math.min(2.4, z0*mult));
    // 以鼠标位置为锚点
    state[which].panX = mx - (mx-state[which].panX)*(z1/z0);
    state[which].panY = my - (my-state[which].panY)*(z1/z0);
    state[which].zoom=z1;
    applyTransform(which);
  },{passive:false});
  stageEl.addEventListener('dblclick',e=>{
    if(e.target.closest('.node')) return;
    homeView(which);
  });
}
function contentBounds(){
  const v=visibleNodes();
  if(!v.length) return {minX:0,minY:0,maxX:2400,maxY:1300};
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  v.forEach(n=>{
    const p=baseNodePos(n);
    minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y);
  });
  return {minX,minY,maxX,maxY};
}
function homeView(which){
  if(which==='gene'){
    const stage=$('#geneStage'); const W=stage.clientWidth, H=stage.clientHeight;
    const b=contentBounds();
    const padX = state.mode==='gene' && state.era==='all' ? 220 : 260;
    const padY = state.mode==='gene' && state.era==='all' ? 180 : 220;
    let zoom=Math.min(W/Math.max(1,(b.maxX-b.minX+padX)), H/Math.max(1,(b.maxY-b.minY+padY)));
    zoom = Math.min(state.mode==='gene' && state.era==='all' ? .58 : .86, Math.max(.40, zoom*.98));
    const cx=(b.minX+b.maxX)/2, cy=(b.minY+b.maxY)/2;
    state.gene={zoom, panX:W/2-cx*zoom, panY:H/2-cy*zoom};
  } else {
    const stage=$('#mapStage'); const W=stage.clientWidth, H=stage.clientHeight;
    const zoom = Math.min(W/MAP_W, H/MAP_H)*.98;
    state.map={zoom, panX:(W-MAP_W*zoom)/2, panY:(H-MAP_H*zoom)/2};
  }
  applyTransform(which);
}

function renderAll(){
  renderEras(); renderLayers(); updateModeButtons();
  if(state.mode==='map') renderMap(); else renderGraph();
  renderPanel();
  applyTransform('gene'); applyTransform('map');
}

function initInteractions(){
  $$('.btn[data-mode]').forEach(b=>b.onclick=()=>{
    state.mode=b.dataset.mode;
    state.era='all';
    if(state.mode==='gene') state.selected='';
    else if(state.mode==='ma') state.selected='maProgram';
    else if(state.mode==='debate') state.selected='mills';
    else if(state.mode==='map' && !routes[state.selected]) state.selected='lazarsfeld';
    renderAll();
    requestAnimationFrame(()=>{ homeView(state.mode==='map'?'map':'gene'); renderAll(); });
  });
  $('#singleRouteBtn').onclick=()=>{ state.showContextRoutes=false;
    $('#singleRouteBtn').classList.add('active'); $('#contextRouteBtn').classList.remove('active'); renderAll(); };
  $('#contextRouteBtn').onclick=()=>{ state.showContextRoutes=true;
    $('#contextRouteBtn').classList.add('active'); $('#singleRouteBtn').classList.remove('active'); renderAll(); };
  const atl=$('#focusAtlanticBtn');
  if(atl) atl.onclick=()=>{ homeView('map'); };
  const east=$('#focusUSEastBtn');
  if(east) east.onclick=()=>{ homeView('map'); };
  $('#zoomIn').onclick=()=>{ const k=state.mode==='map'?'map':'gene'; state[k].zoom=Math.min(2.4,state[k].zoom*1.12); applyTransform(k); };
  $('#zoomOut').onclick=()=>{ const k=state.mode==='map'?'map':'gene'; state[k].zoom=Math.max(.3,state[k].zoom*0.9); applyTransform(k); };
  $('#zoomHome').onclick=()=>{ homeView(state.mode==='map'?'map':'gene'); };
  $('#searchInput').addEventListener('keydown',e=>{
    if(e.key!=='Enter') return;
    const q=e.target.value.trim().toLowerCase(); if(!q) return;
    const hit=nodes.find(n=>`${n.label} ${n.sub}`.toLowerCase().includes(q));
    if(hit){
      state.selected=hit.id;
      if(state.mode==='ma' && !isMA(hit) && !['basr','merton','white','iserp'].includes(hit.id)) state.mode='gene';
      if(state.mode==='debate' && !isDebate(hit)) state.mode='gene';
      if(state.mode==='map' && !routes[hit.id]) state.mode='gene';
      if(state.era!=='all' && hit.era!==state.era) state.era='all';
      renderAll(); requestAnimationFrame(()=>homeView(state.mode==='map'?'map':'gene')); toast('已定位到 '+hit.label);
    } else toast('未找到匹配节点');
  });
  window.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ state.selected=''; renderAll(); }
  });
}



/* =========================================================
   移动端触屏支持：单指拖拽、双指缩放、点击节点后滚动到详情
   ========================================================= */
function scrollToPanelOnMobile(){
  if(window.innerWidth <= 768){
    setTimeout(()=>{
      document.querySelector('#panel')?.scrollIntoView({behavior:'smooth', block:'start'});
    },80);
  }
}

function setupTouchPanZoom(stageEl, which){
  if(!stageEl) return;
  let lastTouches=[];
  let startPan={x:0,y:0};
  let startZoom=1;
  let startDist=0;
  let startMid={x:0,y:0};

  const dist=(a,b)=>Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
  const mid=(a,b)=>({x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2});

  stageEl.addEventListener('touchstart',e=>{
    if(e.target.closest('.node')) return;
    if(e.touches.length===1){
      const t=e.touches[0];
      lastTouches=[{x:t.clientX,y:t.clientY}];
      startPan={x:state[which].panX,y:state[which].panY};
    } else if(e.touches.length===2){
      e.preventDefault();
      startDist=dist(e.touches[0],e.touches[1]);
      startMid=mid(e.touches[0],e.touches[1]);
      startZoom=state[which].zoom;
      startPan={x:state[which].panX,y:state[which].panY};
    }
  }, {passive:false});

  stageEl.addEventListener('touchmove',e=>{
    if(e.target.closest('.node')) return;
    if(e.touches.length===1 && lastTouches.length===1){
      e.preventDefault();
      const t=e.touches[0];
      state[which].panX=startPan.x+(t.clientX-lastTouches[0].x);
      state[which].panY=startPan.y+(t.clientY-lastTouches[0].y);
      applyTransform(which);
    } else if(e.touches.length===2){
      e.preventDefault();
      const d=dist(e.touches[0],e.touches[1]);
      const m=mid(e.touches[0],e.touches[1]);
      const rect=stageEl.getBoundingClientRect();
      const mx=startMid.x-rect.left;
      const my=startMid.y-rect.top;
      const z0=startZoom;
      const z1=Math.max(.28, Math.min(2.6, startZoom*(d/startDist)));
      state[which].panX = mx - (mx-startPan.x)*(z1/z0) + (m.x-startMid.x);
      state[which].panY = my - (my-startPan.y)*(z1/z0) + (m.y-startMid.y);
      state[which].zoom=z1;
      applyTransform(which);
    }
  }, {passive:false});

  stageEl.addEventListener('touchend',()=>{ lastTouches=[]; }, {passive:true});
}

document.addEventListener('click', e=>{
  const node=e.target.closest('#nodeLayer .node');
  if(node && window.innerWidth <= 768){
    e.stopPropagation();
    state.selected=node.dataset.id;
    state.panelOpen=true;
    renderAll();
    scrollToPanelOnMobile();
  }
});

let resizeTimer=null;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    const current = state.mode === 'map' ? 'map' : 'gene';
    requestAnimationFrame(()=>{
      homeView(current);
      renderAll();
    });
  },120);
});

setupPanZoom($('#geneStage'),'gene');
setupPanZoom($('#mapStage'),'map');
setupTouchPanZoom($('#geneStage'),'gene');
setupTouchPanZoom($('#mapStage'),'map');
initInteractions();
// 等待布局完成后再 home
renderAll(); requestAnimationFrame(()=>{ homeView('gene'); homeView('map'); renderAll(); });
</script>
